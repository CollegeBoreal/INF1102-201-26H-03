<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🆔 : 300141429</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            opacity: 0.8;
        }

        .status {
            margin-top: 20px;
            padding: 10px 15px;
            display: inline-block;
            background: #22c55e;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚀 Déploiement réussi avec Ansible</h1>
        <p>Le serveur a été configuré et déployé automatiquement.</p>

        <div class="status">✔ SUCCESS</div>

        <br>

        <a class="btn" href="#">Voir les logs</a>
    </div>
</body>
</html>
