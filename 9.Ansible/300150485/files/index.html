<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300150485 - Nadir Fetis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 50px 60px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .badge {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00c6ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 35px;
            font-size: 1rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }
        .info-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
        }
        .info-box .label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .info-box .value {
            font-size: 1rem;
            font-weight: 600;
            color: #00c6ff;
        }
        .status {
            background: rgba(0,255,100,0.1);
            border: 1px solid rgba(0,255,100,0.3);
            border-radius: 12px;
            padding: 12px 20px;
            color: #00ff64;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">INF1102 - College Boreal</div>
        <h1>Deploiement Ansible</h1>
        <p class="subtitle">Automatisation avec Nginx + Ansible</p>
        <div class="info-grid">
            <div class="info-box">
                <div class="label">Etudiant</div>
                <div class="value">Nadir Fetis</div>
            </div>
            <div class="info-box">
                <div class="label">Identifiant</div>
                <div class="value">300150485</div>
            </div>
            <div class="info-box">
                <div class="label">Outil</div>
                <div class="value">Ansible</div>
            </div>
            <div class="info-box">
                <div class="label">Serveur</div>
                <div class="value">Nginx</div>
            </div>
        </div>
        <div class="status">Deploiement reussi avec succes</div>
        <div class="footer">Hiver 2026 - College Boreal</div>
    </div>
</body>
</html>
