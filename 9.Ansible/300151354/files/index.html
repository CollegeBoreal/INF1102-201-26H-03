<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déploiement Ansible</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            background: rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #cbd5f5;
        }

        .card {
            background: #1e293b;
            margin: 40px auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .success {
            color: #22c55e;
            font-weight: bold;
            font-size: 1.3em;
        }

        footer {

            padding: 20px;

</head>

<body>

    <header>
        <h1>🚀 Déploiement avec Ansible</h1>
        <p>Projet INF1102 - Configuration automatique</p>

    <div class="card">
        <p class="success">✔ Nginx installé avec succès</p>
        <p>✔ Page web déployée automatiquement</p>
        <p>✔ Service actif et fonctionnel</p>
    </div>

    <footer>
        <p>👨‍💻 ID : 300151354</p>
